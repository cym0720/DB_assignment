<!DOCTYPE html>
<html lang="zh-CN"> <!-- 修复重复的lang标签问题 -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>羽毛球系统登录界面</title>
  <style>
    /* 简单美化样式，提升体验 */
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }
    .login-container {
      width: 400px;
      margin: 100px auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    td {
      padding: 10px 0;
    }
    input {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    button {
      padding: 8px 20px;
      margin: 0 5px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #submit {
      background-color: #409eff;
      color: white;
    }
    #submit:hover {
      background-color: #66b1ff;
    }
    .register-btn {
      background-color: #2bac27;
      color: white;
    }
    .register-btn:hover {
      background-color: #5cc65c;
    }
    .error-tip {
      color: #f56c6c;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1 style="text-align: center; margin-bottom: 20px;">羽毛球系统登录界面</h1>
    <form id="loginForm"> <!-- 去掉action，用JS处理提交 -->
      <table>
        <tr>  
          <td>用户名:</td>
          <td><input type="text" id="username" name="username" required placeholder="请输入用户名"></td>
        </tr>
        <tr>
          <td>密码:</td>
          <td><input type="password" id="password" name="password" required placeholder="请输入密码"></td>
        </tr>
        <tr>
          <td colspan="2" style="text-align: center;">
            <button type="button" id="submit">登录</button> <!-- 改为button类型，避免默认提交 -->
            <button type="button" class="register-btn" onclick="window.location.href='register.html'">注册</button>
          </td>
        </tr>
      </table>
      <div class="error-tip" id="errorTip"></div> <!-- 错误提示框 -->
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit');
    const errorTip = document.getElementById('errorTip');

    async function login() {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      if (!username) {
        showError('请输入用户名！');
        return;
      }
      if (!password) {
        showError('请输入密码！');
        return;
      }

      try {
        // 2.2 发送POST请求到后端登录接口
        const response = await fetch('http://127.0.0.1:8000/users/login', {
          method: 'POST', // 登录用POST更安全，避免密码暴露在URL中
          headers: {
            'Content-Type': 'application/json', // 告诉后端传的是JSON格式
          },
          body: JSON.stringify({
            username: username,
            password: password
          })
        });

        const result = await response.json();
        
        if (result.message =='登录成功') {
          alert('登录成功！');
          localStorage.setItem('currentUser', JSON.stringify(result.user));
          window.location.href = 'user.html';
        } else {
          showError(result.msg || '登录失败，请检查用户名或密码！');
        }
      } catch (error) {
        showError('网络异常，请检查后端服务是否启动！');
        console.error('登录请求失败：', error);
      }
    }

    function showError(msg) {
      errorTip.textContent = msg;
      errorTip.style.display = 'block';
      // 3秒后自动隐藏错误提示
      setTimeout(() => {
        errorTip.style.display = 'none';
      }, 3000);
    }

    submitBtn.addEventListener('click', login);

    loginForm.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        login();
      }
    });
  </script>
</body>
</html>
