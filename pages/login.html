<!DOCTYPE html>
<html lang="zh-CN"> <!-- 修复重复的lang标签问题 -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>羽毛球系统登录界面</title>
  <style>
    /* 简单美化样式，提升体验 */
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }
    .login-container {
      width: 400px;
      margin: 100px auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    td {
      padding: 10px 0;
    }
    input {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    button {
      padding: 8px 20px;
      margin: 0 5px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #submit {
      background-color: #409eff;
      color: white;
    }
    #submit:hover {
      background-color: #66b1ff;
    }
    .register-btn {
      background-color: #2bac27;
      color: white;
    }
    .register-btn:hover {
      background-color: #5cc65c;
    }
    .error-tip {
      color: #f56c6c;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1 style="text-align: center; margin-bottom: 20px;">羽毛球系统登录界面</h1>
    <form id="loginForm"> <!-- 去掉action，用JS处理提交 -->
      <table>
        <tr>  
          <td>用户名:</td>
          <td><input type="text" id="username" name="username" required placeholder="请输入用户名"></td>
        </tr>
        <tr>
          <td>密码:</td>
          <td><input type="password" id="password" name="password" required placeholder="请输入密码"></td>
        </tr>
        <tr>
          <td colspan="2" style="text-align: center;">
            <button type="button" id="submit">登录</button> <!-- 改为button类型，避免默认提交 -->
            <button type="button" class="register-btn" onclick="window.location.href='register.html'">注册</button>
          </td>
        </tr>
      </table>
      <div class="error-tip" id="errorTip"></div> <!-- 错误提示框 -->
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit');
    const errorTip = document.getElementById('errorTip');

  async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const API = "http://127.0.0.1:8001";

    // 先尝试普通用户登录
    try {
      const resUser = await fetch(`${API}/users/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      if (resUser.ok) {
        const data = await resUser.json();
        localStorage.setItem("currentUser", JSON.stringify(data.user));
        localStorage.setItem("role", "user");
        location.href = "user.html";
        return;
      }
    } catch (e) {
      // 忽略，继续尝试管理员登录
    }

    // 尝试管理员登录
    try {
      const resAdmin = await fetch(`${API}/admin/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await resAdmin.json();
      if (resAdmin.ok) {
        localStorage.setItem("role", "admin");
        localStorage.setItem("adminToken", data.token);
        location.href = "admin.html";
        return;
      } else {
        alert(data.detail || "账号或密码错误");
      }
    } catch (e) {
      alert("网络异常，登录失败");
    }
  }

    function showError(msg) {
      errorTip.textContent = msg;
      errorTip.style.display = 'block';
      // 3秒后自动隐藏错误提示
      setTimeout(() => {
        errorTip.style.display = 'none';
      }, 3000);
    }

    submitBtn.addEventListener('click', login);

    loginForm.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        login();
      }
    });
  </script>
</body>
</html>
